name: Build Windows

on:
  push:
    tags:
      - "v*"           # trigger on version tags: v0.1.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual runs from Actions tab

jobs:
  build-windows:
    name: Build Windows (.exe installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install PySide6 static_ffmpeg

      - name: Run tests
        run: |
          set QT_QPA_PLATFORM=offscreen
          python -m pytest tests/ --ignore=tests/gui -q --tb=short
        shell: cmd

      - name: Build .exe
        run: pyinstaller -y m4bmaker-windows.spec

      - name: Build installer
        shell: cmd
        run: |
          choco install innosetup -y --no-progress
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: m4Bookmaker-windows-setup
          path: dist/m4Bookmaker-windows-setup.exe
