[flake8]
max-line-length = 88
# E203: whitespace before ':' (conflicts with black slice formatting)
# W503: line break before binary operator (conflicts with black)
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    *.egg-info,
    .mypy_cache,
    .pytest_cache

[mypy]
python_version = 3.11
strict = True
warn_return_any = True
warn_unused_configs = True
show_error_codes = True

# mutagen ships no py.typed marker — suppress missing stubs
[mypy-mutagen]
ignore_missing_imports = True

[mypy-mutagen.*]
ignore_missing_imports = True

# natsort ships type stubs via types-natsort; no suppression needed
# PIL (Pillow) — only used in cover.py; suppress missing stubs if not installed
[mypy-PIL]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True
